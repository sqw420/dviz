# DViz Vehicle Path Following Dataflow with Zenoh
#
# This dataflow runs the vehicle-path-following simulation headlessly and
# publishes data via Zenoh for remote visualization on PC.
#
# Architecture:
#   [Robot - Headless]                 [PC - Display]
#   vehicle-path-following nodes       dviz-shell + Rerun
#   dviz-bridge (Zenoh pub)  ------->  Zenoh subscriber
#
# Usage:
#   1. Build: cargo build --release -p dviz-rerun-bridge
#   2. Start Dora: dora up
#   3. Run dataflow: dora start dataflow-path-following.yml --name pathfollow
#   4. In another terminal: cargo run -p dviz-shell
#   5. Click "Spawn Rerun" then "Connect Zenoh"
#
# Requirements:
#   - Dora CLI installed
#   - pip install dora-rs pyyaml numpy pyarrow

nodes:
  # Bicycle Model - Vehicle Simulator
  # Receives steering/throttle commands, outputs vehicle pose
  - id: bicycle_model
    operator:
      python: /Users/nupylot/Public/dora-examples/examples/vehicle-path-following/src/bicycle_model.py
      inputs:
        tick: dora/timer/millis/20
        steering_cmd: simple_planner/steering_cmd
        throttle_cmd: simple_planner/throttle_cmd
      outputs:
        - sim_pose
        - sim_state

  # Simple Planner - Pure Pursuit Path Following
  # Receives vehicle pose, outputs steering/throttle commands
  - id: simple_planner
    operator:
      python: /Users/nupylot/Public/dora-examples/examples/vehicle-path-following/src/simple_planner.py
      inputs:
        sim_pose: bicycle_model/sim_pose
      outputs:
        - steering_cmd
        - throttle_cmd
        - target_point
        - waypoints

  # IMU Synthesizer - Generate IMU from vehicle state
  - id: imu_synthesizer
    operator:
      python: /Users/nupylot/Public/dora-examples/examples/vehicle-path-following/src/imu_synthesizer.py
      inputs:
        sim_state: bicycle_model/sim_state
      outputs:
        - imu_msg

  # DViz Zenoh Bridge - Publish simulation data via Zenoh
  - id: dviz_bridge
    path: /Users/nupylot/Public/dviz/target/release/dviz-dora-bridge
    inputs:
      sim_pose: bicycle_model/sim_pose
      sim_state: bicycle_model/sim_state
      target_point: simple_planner/target_point
      waypoints: simple_planner/waypoints
      imu_msg: imu_synthesizer/imu_msg
    env:
      ZENOH_TOPIC_PREFIX: dviz
      RUST_LOG: info
