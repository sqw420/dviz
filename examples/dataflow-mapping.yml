# DViz Vehicle Mapping Dataflow with Zenoh
#
# This dataflow runs the vehicle-mapping pipeline headlessly and
# publishes data via Zenoh for remote visualization on PC.
#
# Architecture:
#   [Robot - Headless]                 [PC - Display]
#   vehicle-mapping nodes              dviz-shell + Rerun
#   dviz-bridge (Zenoh pub)  ------->  Zenoh subscriber
#
# Usage (Same Machine Testing):
#   1. Build: cargo build --release -p dviz-rerun-bridge
#   2. Start Dora: dora up
#   3. Run dataflow: dora start dataflow-mapping.yml --name mapping
#   4. In another terminal: cargo run -p dviz-shell
#   5. Click "Spawn Rerun" then "Connect Zenoh"
#
# Usage (Robot + PC on LAN):
#   Robot side:
#     dora start dataflow-mapping.yml --name mapping
#   PC side:
#     cargo run -p dviz-shell
#     Click "Spawn Rerun" then "Connect Zenoh"
#
# Requirements:
#   - Dora CLI installed
#   - Python nodes from dora-examples/vehicle-mapping
#   - pip install dora-rs pyyaml numpy pyarrow open3d
#   - PCD data files in vehicle-mapping/data/

nodes:
  # PCD Source - Reads point cloud files
  # Publishes point clouds at configurable rate
  - id: pcd_source
    operator:
      python: /home/demo/dora-examples/examples/vehicle-mapping/src/operators/pcd_source_op.py
      inputs:
        tick: dora/timer/millis/500  # 2 Hz publishing rate
      outputs:
        - pointcloud
        - frame_info
        - sequence_complete
    env:
      PCD_DATA_DIR: /home/demo/dora-examples/examples/vehicle-mapping/data/rectangle_sequence

  # ICP Odometry - Estimates poses from point clouds
  # Uses Open3D ICP with local map for robustness
  - id: icp_odometry
    operator:
      python: /home/demo/dora-examples/examples/vehicle-mapping/src/operators/icp_odometry_op.py
      inputs:
        pointcloud: pcd_source/pointcloud
        frame_info: pcd_source/frame_info
      outputs:
        - pose
        - odometry_status

  # Map Builder - Builds global point cloud map
  # Accumulates transformed point clouds
  - id: map_builder
    operator:
      python: /home/demo/dora-examples/examples/vehicle-mapping/src/operators/map_builder_op.py
      inputs:
        pointcloud: pcd_source/pointcloud
        pose: icp_odometry/pose
        sequence_complete: pcd_source/sequence_complete
      outputs:
        - map_stats
        - map_complete

  # Waypoint Extractor - Extracts waypoints from trajectory
  - id: waypoint_extractor
    operator:
      python: /home/demo/dora-examples/examples/vehicle-mapping/src/operators/waypoint_extractor_op.py
      inputs:
        pose: icp_odometry/pose
        map_complete: map_builder/map_complete
      outputs:
        - waypoints
        - trajectory

  # DViz Zenoh Bridge - Publish mapping data via Zenoh
  # Receives point clouds, poses, stats and publishes for remote visualization
  - id: dviz_bridge
    build: cargo build --release -p dviz-rerun-bridge
    path: /home/demo/dviz/target/release/dviz-dora-bridge
    inputs:
      pointcloud: pcd_source/pointcloud
      # ICP outputs 4x4 matrix or x,y,z,qx,qy,qz,qw - use odom_pose input for transform3d
      odom_pose: icp_odometry/pose
      trajectory: waypoint_extractor/trajectory
    env:
      ZENOH_TOPIC_PREFIX: dviz
      # Optional: specify router address for remote connection
      # ZENOH_CONNECT: tcp/192.168.1.100:7447
      RUST_LOG: info
